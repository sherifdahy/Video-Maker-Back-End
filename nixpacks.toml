# nixpacks.toml - Dependencies for Railway deployment
[phase.setup]
# Core dependencies for video processing
nixpkgs = ["ffmpeg", "yt-dlp", "nodejs", "python3", "python311Packages.pip"]

[phase.install]
# Install required tools
cmds = [
  "ffmpeg -version",
  "yt-dlp --version",
  "npm ci --production"
]

[phase.build]
# Pre-production setup
cmds = ["mkdir -p tmp output uploads"]

[phase.start]
cmd = "npm start"
